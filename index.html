<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>富文本 ⇄ Markdown 双向转换</title>
    <link rel="stylesheet" href="./style.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            color: white;
            margin-bottom: 30px;
        }

        header h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
        }

        header p {
            font-size: 1.1rem;
            opacity: 0.9;
        }

        .mode-switch {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-bottom: 20px;
        }

        .mode-btn {
            padding: 10px 24px;
            border: 2px solid white;
            border-radius: 8px;
            background: rgba(255, 255, 255, 0.2);
            color: white;
            cursor: pointer;
            font-size: 1rem;
            font-weight: 500;
            transition: all 0.3s;
        }

        .mode-btn:hover {
            background: rgba(255, 255, 255, 0.3);
        }

        .mode-btn.active {
            background: white;
            color: #667eea;
        }

        .editor-container {
            height: 720px;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 20px;
        }

        .panel {
            background: white;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        .panel-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px;
            background: #f8f9fa;
            border-bottom: 2px solid #e9ecef;
        }

        .panel-header h2 {
            font-size: 1.3rem;
            color: #333;
        }

        .btn {
            padding: 8px 20px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.95rem;
            font-weight: 500;
            transition: all 0.3s;
        }

        .btn-primary {
            background: #667eea;
            color: white;
        }

        .btn-primary:hover {
            background: #5568d3;
            transform: translateY(-2px);
        }

        .btn-secondary {
            background: #6c757d;
            color: white;
        }

        .btn-secondary:hover {
            background: #5a6268;
        }

        .editor-wrapper {
            flex: 1;
            display: flex;
            flex-direction: column;
            min-height: 0;
        }

        #editor-toolbar {
            border-bottom: 1px solid #e8e8e8;
            flex-shrink: 0;
        }

        #editor-container {
            flex: 1;
            overflow-y: auto;
            min-height: 0;
        }
        
        #editor-container p {
            margin: 5px 0;
        }

        #markdownOutput, #markdownInput {
            flex: 1;
            padding: 20px;
            border: none;
            font-family: 'Consolas', 'Monaco', monospace;
            font-size: 14px;
            line-height: 1.6;
            resize: none;
            background: #f8f9fa;
            color: #333;
        }

        #markdownInput:focus {
            outline: 2px solid #667eea;
            outline-offset: -2px;
        }

        #preview-container {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            background: white;
        }

        #preview-container h1,
        #preview-container h2,
        #preview-container h3,
        #preview-container h4,
        #preview-container h5,
        #preview-container h6 {
            margin: 16px 0 8px 0;
            font-weight: 600;
        }

        #preview-container p {
            margin: 8px 0;
            line-height: 1.6;
        }

        #preview-container ul,
        #preview-container ol {
            margin: 8px 0;
            padding-left: 24px;
        }

        #preview-container li {
            margin: 4px 0;
        }

        #preview-container code {
            background: #f4f4f4;
            padding: 2px 6px;
            border-radius: 3px;
            font-family: 'Consolas', 'Monaco', monospace;
            font-size: 0.9em;
        }

        #preview-container pre {
            background: #f4f4f4;
            padding: 12px;
            border-radius: 6px;
            overflow-x: auto;
            margin: 12px 0;
        }

        #preview-container pre code {
            background: none;
            padding: 0;
        }

        #preview-container blockquote {
            border-left: 4px solid #667eea;
            padding-left: 16px;
            margin: 12px 0;
            color: #666;
        }

        #preview-container table {
            border-collapse: collapse;
            width: 100%;
            margin: 12px 0;
        }

        #preview-container table th,
        #preview-container table td {
            border: 1px solid #ddd;
            padding: 8px 12px;
            text-align: left;
        }

        #preview-container table th {
            background: #f8f9fa;
            font-weight: 600;
        }

        #preview-container img {
            max-width: 100%;
            height: auto;
        }

        #preview-container a {
            color: #667eea;
            text-decoration: none;
        }

        #preview-container a:hover {
            text-decoration: underline;
        }

        .direction-indicator {
            display: flex;
            align-items: center;
            gap: 8px;
            color: #667eea;
            font-weight: 600;
        }

        .arrow {
            font-size: 1.5rem;
        }

        footer {
            text-align: center;
            color: white;
            opacity: 0.8;
            font-size: 0.95rem;
        }

    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>📝 富文本 ⇄ Markdown 双向转换</h1>
            <p>选择转换方向，实时预览转换结果</p>
        </header>

        <div class="mode-switch">
            <button class="mode-btn active" data-mode="toMarkdown">
                富文本 → Markdown
            </button>
            <button class="mode-btn" data-mode="toRichText">
                Markdown → 富文本
            </button>
        </div>

        <div class="editor-container">
            <div class="panel" id="leftPanel">
                <div class="panel-header">
                    <div>
                        <h2 id="leftTitle">富文本编辑器</h2>
                        <div class="direction-indicator" id="leftIndicator" style="display: none;">
                            <span class="arrow">✏️</span>
                            <span>编辑区</span>
                        </div>
                    </div>
                    <button id="clearLeftBtn" class="btn btn-secondary">清空</button>
                </div>
                <div class="editor-wrapper" id="richTextWrapper">
                    <div id="editor-toolbar"></div>
                    <div id="editor-container"></div>
                </div>
                <textarea id="markdownInput" style="display: none;"></textarea>
            </div>

            <div class="panel" id="rightPanel">
                <div class="panel-header">
                    <div>
                        <h2 id="rightTitle">Markdown 输出</h2>
                        <div class="direction-indicator" id="rightIndicator" style="display: none;">
                            <span class="arrow">👁️</span>
                            <span>预览区</span>
                        </div>
                    </div>
                    <button id="copyRightBtn" class="btn btn-primary">复制</button>
                </div>
                <textarea id="markdownOutput" readonly></textarea>
                <div class="editor-wrapper" id="richTextPreview" style="display: none;">
                    <div id="preview-container"></div>
                </div>
            </div>
        </div>

        <footer>
            <p>支持粗体、斜体、标题、列表、链接、图片、代码块、表格等常见格式</p>
        </footer>
    </div>

    <script type="module" src="./main.js"></script>
</body>
</html>
